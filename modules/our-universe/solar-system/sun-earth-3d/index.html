<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wonder Lab: Sun and Earth 3D</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="space-stage" aria-labelledby="app-title">
        <div class="top-bar">
          <div>
            <p class="eyebrow">Three.js Lab</p>
            <h1 id="app-title">Sun and Earth 3D</h1>
          </div>
          <div class="top-actions">
            <a class="home-link" href="../../../../index.html">Contents</a>
            <button class="icon-button" id="pauseButton" type="button" aria-label="Pause orbit">
              <span id="pauseIcon">II</span>
            </button>
          </div>
        </div>

        <canvas id="solarCanvas" aria-label="3D Sun orbited by Earth"></canvas>

        <div class="focus-strip" aria-label="Focus controls">
          <button class="focus-button" type="button" data-focus-target="Sun">Sun</button>
          <button class="focus-button" type="button" data-focus-target="Mercury">Mercury</button>
          <button class="focus-button" type="button" data-focus-target="Venus">Venus</button>
          <button class="focus-button" type="button" data-focus-target="Earth">Earth</button>
          <button class="focus-button" type="button" data-focus-target="Moon">Moon</button>
          <button class="focus-button" type="button" data-focus-target="Mars">Mars</button>
          <button class="focus-button" type="button" data-focus-target="Jupiter">Jupiter</button>
          <button class="focus-button" type="button" data-focus-target="Saturn">Saturn</button>
          <button class="focus-button" type="button" data-focus-target="Uranus">Uranus</button>
          <button class="focus-button" type="button" data-focus-target="Neptune">Neptune</button>
          <button class="focus-button" type="button" data-focus-target="Pluto">Pluto</button>
        </div>

        <div class="control-strip" aria-label="Orbit controls">
          <button class="control-button" type="button" data-speed="0.2">Slow</button>
          <button class="control-button is-active" type="button" data-speed="0.55">Normal</button>
          <button class="control-button" type="button" data-speed="1.1">Fast</button>
        </div>

        <div class="scale-strip" aria-label="Scale controls">
          <button class="scale-button is-active" type="button" data-scale-mode="diagram">Diagram</button>
          <button class="scale-button" type="button" data-scale-mode="real">Real scale</button>
        </div>

        <aside class="info-panel is-hidden" id="infoPanel" aria-live="polite" aria-label="Object facts">
          <button class="info-close" id="infoClose" type="button" aria-label="Close facts">×</button>
          <p class="info-kicker" id="infoKicker"></p>
          <h2 id="infoTitle"></h2>
          <img class="info-image is-hidden" id="infoImage" alt="">
          <p id="infoIntro"></p>
          <ul id="infoFacts"></ul>
        </aside>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="script.js?v=30"></script>
  </body>
</html>
